name: Cloud Build Android APK

on:
  workflow_dispatch: # Iska matlab hai hum isay manually run karenge

jobs:
  build-android:
    name: Build APK on Cloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' 

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: npm install

      - name: Build Next.js Web App
        run: npm run build

      - name: Install Capacitor & Initialize
        run: |
          npm install @capacitor/core @capacitor/android
          npm install -D @capacitor/cli
          npx cap init "PDFCraft" "com.pdfcraft.app" --web-dir "out"
          npx cap add android
          npx cap sync android

      - name: Build APK (Debug)
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Upload APK file
        uses: actions/upload-artifact@v4
        with:
          name: PDFCraft-Cloud-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
